<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dictum</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <header class="header">
    <h1>Dictum</h1>
    <p>"o que foi dito"</p>
  </header>

  <main class="container">
    
    <!-- Upload -->
    <label class="card">
      <p>Arquivo MP3 / MP4</p>
      <i class="fa-solid fa-upload icon"></i>
      <input type="file" accept=".mp3,.mp4">
    </label>

    <!-- Download -->
    <div class="download-section">
      <p>Anexe o arquivo para gerar o relatório pdf</p>
      <button class="btn">
        Download <i class="fa-solid fa-download icon"></i>
      </button>
    </div>

  </main>

</body>
</html>
