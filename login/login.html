<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dictum Login</title>

  <!-- Fontes -->
  <link href="https://fonts.cdnfonts.com/css/the-seasons" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet">

  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="header">
    <h1>Dictum</h1>
    <p>"O que foi dito"</p>
  </div>

  <div class="container">
    <h2>Conecte-se a sua conta:</h2>

    <div class="input-group">
      <input type="text" id="email" placeholder="Email">
      <div id="emailMsg" class="msg"></div>
    </div>

    <div class="input-group">
      <input type="password" id="senha" placeholder="Senha">
      <div id="senhaMsg" class="msg"></div>
    </div>

    <button id="btn" disabled>Entrar</button>

    <div class="link">
      Criar <a href="#">conta</a>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
